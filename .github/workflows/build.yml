name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep "versionCode" app/build.gradle | head -1 | sed 's/.*\(.*\).*/\1/' | tr -d ' ')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Built version: $VERSION_NAME ($VERSION_CODE)"

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/BooruApp-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.version_code }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: BooruApp v${{ steps.version.outputs.version_name }}
          body: |
            ## BooruApp v${{ steps.version.outputs.version_name }}

            ### Features
            - Multi-API: Gelbooru & Rule34.xxx
            - FYP System: Auto-suggests 5 artworks
            - Synchronized Tag System
            - Android 7+ (API 24+)

            ### How to install
            1. Download the APK below
            2. Enable "Install from Unknown Sources" on your device
            3. Install the APK

            ### Setup
            1. Open the app
            2. Go to Settings (gear icon)
            3. Enter your Gelbooru and/or Rule34.xxx API credentials
            4. Start searching!
          files: app/build/outputs/apk/debug/BooruApp-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
